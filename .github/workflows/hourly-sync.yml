name: Hourly Data Sync

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      photo_sync_hours:
        description: 'Hours of photo history to sync (default 2, use 8760 for ~1 year backfill)'
        required: false
        default: '2'

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install sqlalchemy pymysql pandas requests
      
      - name: Run hourly sync
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          WORKER_API_URL: ${{ secrets.WORKER_API_URL }}
          PHOTO_SYNC_HOURS: ${{ github.event.inputs.photo_sync_hours || '2' }}
        run: |
          cd backend
          python hourly-sync.py
